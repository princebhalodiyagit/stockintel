name: Daily Stock Data Refresh

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install yfinance requests beautifulsoup4 pandas

      - name: Run data collection
        run: python run_all_github.py

      - name: Commit and push data
        run: |
          git config user.email "stockintel@auto.com"
          git config user.name "StockIntel Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Daily refresh $(date '+%Y-%m-%d')"
          git push
